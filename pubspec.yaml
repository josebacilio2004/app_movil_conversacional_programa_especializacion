name: app_especializacion
description: "App Móvil con chatbot de recomendación para programas de especialización."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  provider: ^6.1.1
  cloud_firestore: ^4.15.0
  http: ^1.2.0
  cloud_functions: any
  fl_chart: ^1.2.0
  flutter_spinkit: ^5.2.2
  lottie: ^3.3.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - brand/logo.png
